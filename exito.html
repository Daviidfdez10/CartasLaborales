<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago completado — Descarga tu carta | Cartaslaborales.es</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1a6b4a; --verde-claro: #e8f5ee; --negro: #111;
      --gris: #555; --gris-claro: #f5f4f0; --borde: #e0ddd6; --blanco: #fff;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--font-body); background: var(--gris-claro); color: var(--negro); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: var(--blanco); border-radius: 20px; border: 1px solid var(--borde); padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; }
    .icono { font-size: 48px; margin-bottom: 1.25rem; }
    h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; margin-bottom: 0.75rem; }
    p { font-size: 15px; color: var(--gris); margin-bottom: 1.75rem; line-height: 1.7; }
    .btn {
      display: inline-block; padding: 14px 2rem;
      background: var(--verde); color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; font-family: var(--font-body);
      cursor: pointer; text-decoration: none; margin-bottom: 1rem; width: 100%;
    }
    .btn:hover { background: #145538; }
    .btn-sec {
      display: inline-block; padding: 12px 2rem;
      background: transparent; color: var(--negro);
      border: 1px solid var(--borde); border-radius: 10px;
      font-size: 14px; font-family: var(--font-body);
      cursor: pointer; text-decoration: none; width: 100%;
    }
    .btn-sec:hover { background: var(--gris-claro); }
    .nota { font-size: 12px; color: var(--gris); margin-top: 1.5rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="icono">✅</div>
  <h1>¡Pago completado!</h1>
  <p>Tu carta está lista. Haz clic en el botón para descargar el PDF. Si tienes cualquier problema, escríbenos.</p>

<div class="loading" id="loading">Cargando tus datos...</div>
<button class="btn" id="btnDescargar" style="display:none" onclick="descargarPDF()">
  Descargar mi carta en PDF
</button>
  <a href="/index.html" class="btn-sec">Volver al inicio</a>

  <p class="nota">El PDF se genera en tu navegador. No guardamos ninguno de tus datos personales.</p>
</div>

<script src="js/generador.js"></script>
<script>
 // Lee datos de URL params (método principal) o localStorage (respaldo)
let d = null;

async function cargarDatos() {
  const binId = localStorage.getItem('bin_id');
  if (!binId) {
    document.getElementById('loading').textContent = 'No se encontraron datos. Vuelve atrás.';
    return;
  }
  try {
    const response = await fetch('/api/obtener-datos?binId=' + binId);
    d = await response.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btnDescargar').style.display = 'block';
  } catch (err) {
    document.getElementById('loading').textContent = 'Error al cargar datos. Escríbenos a hola@cartaslaborales.es';
  }
}

function descargarPDF() {
  if (!d) { alert('No se encontraron los datos. Vuelve atrás.'); return; }

  let asunto = '';
  let cuerpo = '';
  let nombreArchivo = 'carta-laboral';
  const tipo = d.tipo || 'baja-voluntaria';

  if (tipo === 'baja-voluntaria') {
    asunto = 'Comunicación de baja voluntaria';
    nombreArchivo = 'carta-baja-voluntaria';
    const motivoTexto = d.motivo ? `, por ${d.motivo},` : '';
    cuerpo = `Por medio de la presente, yo, ${d.nombre}, con DNI ${d.dni} y ocupando el puesto de ${d.puesto} en su empresa${motivoTexto} comunico mi decisión de causar baja voluntaria en la misma.

De acuerdo con lo establecido en el convenio colectivo aplicable, les notifico con un preaviso de ${d.preaviso} días naturales, siendo mi último día de trabajo el ${formatearFecha(d.ultimodia)}.

Agradezco la oportunidad y quedo a su disposición para facilitar la transición.

Ruego acusen recibo de la presente comunicación.`;

  } else if (tipo === 'reclamacion-salario') {
    asunto = 'Reclamación de salario impagado';
    nombreArchivo = 'reclamacion-salario';
    const reclamacionTexto = {
      'no': '',
      'si': ' A pesar de haberlo reclamado verbalmente, la situación no ha sido subsanada.',
      'escrito': ' A pesar de haberlo reclamado por escrito, la situación no ha sido subsanada.'
    }[d.reclamacionprevia] || '';
    cuerpo = `Por medio de la presente, yo, ${d.nombre}, con DNI ${d.dni}, ocupando el puesto de ${d.puesto} en su empresa, reclamo formalmente el abono de los salarios correspondientes a ${d.meses}, que permanecen impagados.${reclamacionTexto}

El importe total adeudado asciende a ${d.importe}, cantidad que les requiero abonen en el plazo máximo de ${d.plazo} días hábiles.

En caso contrario, ejercitaré las acciones legales correspondientes ante el Juzgado de lo Social y/o la Inspección de Trabajo.

Ruego acusen recibo de la presente comunicación.`;
 } else if (tipo === 'respuesta-despido') {
  asunto = 'Impugnación de despido';
  nombreArchivo = 'respuesta-despido';
  const motivoTexto = d.motivoempresa ? ` alegando ${d.motivoempresa}` : '';
  cuerpo = `Por medio de la presente, yo, ${d.nombre}, con DNI ${d.dni}, con una antigüedad de ${d.años} en su empresa, manifiesto mi disconformidad con el despido comunicado con fecha ${formatearFecha(d.fechadespido)}${motivoTexto}.

Considero que dicho despido carece de causa justificada suficiente y por tanto debe ser calificado como IMPROCEDENTE, con las consecuencias legales que ello conlleva en cuanto a indemnización y demás derechos que me asisten.

Me reservo todas las acciones legales que me corresponden, incluida la presentación de papeleta de conciliación y posterior demanda ante el Juzgado de lo Social en el plazo legalmente establecido.

Ruego acusen recibo de la presente comunicación.`;
} else if (tipo === 'reclamacion-vacaciones') {
  asunto = 'Reclamación de vacaciones no disfrutadas';
  nombreArchivo = 'reclamacion-vacaciones';
  cuerpo = `Por medio de la presente, yo, ${d.nombre}, con DNI ${d.dni}, reclamo el abono o disfrute de ${d.dias} días de vacaciones correspondientes al año ${d.año}, que a la fecha permanecen pendientes.\n\nLes requiero que en el plazo de ${d.plazo} días hábiles procedan a fijar las fechas de disfrute o, en su caso, a abonar la compensación económica correspondiente.\n\nRuego acusen recibo de la presente comunicación.`;

} else if (tipo === 'excedencia-voluntaria') {
  asunto = 'Solicitud de excedencia voluntaria';
  nombreArchivo = 'excedencia-voluntaria';
  const motivoTexto = d.motivo ? ` por ${d.motivo}` : '';
  cuerpo = `Por medio de la presente, yo, ${d.nombre}, con DNI ${d.dni}, con una antigüedad de ${d.antiguedad} en la empresa, y al amparo de lo establecido en el artículo 46 del Estatuto de los Trabajadores, solicito formalmente una excedencia voluntaria${motivoTexto}.\n\nDuración solicitada: ${d.duracion}\nFecha de inicio: ${formatearFecha(d.inicio)}\n\nRuego acusen recibo y me comuniquen la aceptación en el plazo establecido.`;

} else if (tipo === 'denuncia-inspeccion') {
  asunto = 'Denuncia ante la Inspección Provincial de Trabajo';
  nombreArchivo = 'denuncia-inspeccion';
  cuerpo = `D./Dña. ${d.nombre}, con DNI ${d.dni}${d.telefono ? ` y teléfono ${d.telefono}` : ''}, comparece ante la Inspección Provincial de Trabajo y formula DENUNCIA contra la empresa ${d.empresa}${d.cif ? ` (CIF: ${d.cif})` : ''}, con domicilio en ${d.direccion}, por los siguientes hechos:\n\n${d.hechos}\n\nPor lo expuesto, solicita que la Inspección de Trabajo gire visita a la empresa denunciada y adopte las medidas oportunas conforme a la normativa laboral vigente.\n\nSolicita asimismo que su identidad sea tratada con carácter confidencial.`;
}

  generarPDF({
    nombre: d.nombre,
    dni: d.dni,
    puesto: d.puesto,
    fecha: formatearFecha(d.fecha),
    empresa: d.empresa,
    responsable: d.responsable || 'Departamento de RRHH',
    asunto,
    cuerpo,
    nombreArchivo,
  });

  localStorage.removeItem('bin_id');
}

cargarDatos();

</script>
</body>
</html>
